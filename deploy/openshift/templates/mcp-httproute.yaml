{{- if .Values.mcpGateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}-mcp
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    mcp-server: "true"
spec:
  parentRefs:
    - name: {{ .Values.mcpGateway.gatewayName }}
      namespace: {{ .Values.mcpGateway.gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "lightspeed-agent.mcpServiceName" . }}
          port: {{ .Values.mcp.port }}
{{- end }}
