{{- if .Values.mlflow.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.mlflowServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.mlflowSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 14 }}
        {{- if .Values.mlflow.route.enabled }}
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.mlflow.port }}
{{- end }}
