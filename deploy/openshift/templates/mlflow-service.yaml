{{- if .Values.mlflow.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lightspeed-agent.mlflowServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  selector:
    {{- include "lightspeed-agent.mlflowSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.mlflow.port }}
      targetPort: {{ .Values.mlflow.port }}
      protocol: TCP
      name: http
  type: ClusterIP
{{- end }}
