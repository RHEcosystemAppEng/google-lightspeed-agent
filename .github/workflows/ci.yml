name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  lint:
    name: Lint
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/retest'))
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}

      - name: Install Python
        run: dnf install -y python3.12 python3.12-pip python3.12-devel

      - name: Install dependencies
        run: python3.12 -m pip install -e ".[agent,dev]"

      - name: Run ruff
        run: python3.12 -m ruff check src/ tests/

      - name: Run mypy
        run: python3.12 -m mypy src/lightspeed_agent/ --ignore-missing-imports

  test:
    name: Test
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/retest'))
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}

      - name: Install Python
        run: dnf install -y python3.12 python3.12-pip python3.12-devel

      - name: Install dependencies
        run: python3.12 -m pip install -e ".[agent,dev]"

      - name: Run tests
        run: python3.12 -m pytest tests/ -v

  build:
    name: Build container image
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/retest'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}

      - name: Build image
        run: podman build -t lightspeed-agent:ci -f Containerfile .

  ci-gate:
    name: CI Gate
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         contains(github.event.comment.body, '/retest'))
      )
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            echo "  lint:  ${{ needs.lint.result }}"
            echo "  test:  ${{ needs.test.result }}"
            echo "  build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
